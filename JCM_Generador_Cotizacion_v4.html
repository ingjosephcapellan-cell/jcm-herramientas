<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JCM — Generador de Cotización</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --azul-profundo: #101E27;
    --azul-medio: #1B3340;
    --teal: #3DADBB;
    --teal-brillante: #60D3E0;
    --blanco-hueso: #F4F9FA;
    --gris-azulado: #92ADB7;
    --linea: #2C4654;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Poppins', sans-serif; background: var(--azul-profundo); color: var(--blanco-hueso); min-height: 100vh; }

  .app-wrapper { max-width: 860px; margin: 0 auto; padding: 32px 24px; }
  .app-header { display: flex; align-items: center; gap: 16px; margin-bottom: 32px; padding-bottom: 20px; border-bottom: 1px solid var(--linea); }
  .app-logo { width: 70px; height: 47px; object-fit: contain; }
  .app-title h1 { font-size: 20px; font-weight: 700; color: var(--blanco-hueso); }
  .app-title p { font-size: 12px; color: var(--gris-azulado); margin-top: 2px; }
  .section-label { font-size: 10px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--teal); margin-bottom: 14px; padding-bottom: 6px; border-bottom: 1px solid var(--linea); }
  .form-section { background: var(--azul-medio); border: 1px solid var(--linea); border-radius: 10px; padding: 22px; margin-bottom: 18px; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-grid.three { grid-template-columns: 1fr 1fr 1fr; }
  label { display: block; font-size: 11px; font-weight: 500; color: var(--gris-azulado); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
  input, select, textarea { width: 100%; background: var(--azul-profundo); border: 1px solid var(--linea); border-radius: 6px; color: var(--blanco-hueso); font-family: 'Poppins', sans-serif; font-size: 13px; padding: 9px 12px; transition: border-color 0.2s; outline: none; }
  input:focus, select:focus, textarea:focus { border-color: var(--teal); }
  select option { background: var(--azul-profundo); }
  textarea { resize: vertical; min-height: 70px; }
  .concepto-card { background: var(--azul-profundo); border: 1px solid var(--linea); border-radius: 8px; padding: 16px; margin-bottom: 12px; }
  .concepto-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .concepto-num { font-size: 11px; font-weight: 600; color: var(--teal); text-transform: uppercase; letter-spacing: 1px; }
  .btn-remove { background: none; border: 1px solid #c0392b44; color: #e74c3c; border-radius: 4px; padding: 3px 10px; font-size: 11px; cursor: pointer; font-family: 'Poppins', sans-serif; }
  .btn-remove:hover { background: #e74c3c22; }
  .concepto-grid { display: grid; grid-template-columns: 1fr 110px 140px; gap: 12px; margin-bottom: 10px; }
  .btn-add { width: 100%; background: none; border: 1px dashed var(--linea); border-radius: 8px; color: var(--gris-azulado); font-family: 'Poppins', sans-serif; font-size: 13px; padding: 12px; cursor: pointer; transition: all 0.2s; margin-bottom: 18px; }
  .btn-add:hover { border-color: var(--teal); color: var(--teal); background: #3DADBB11; }
  .btn-test { width: 100%; background: none; border: 1px solid var(--linea); border-radius: 8px; color: var(--gris-azulado); font-family: 'Poppins', sans-serif; font-size: 12px; padding: 10px; cursor: pointer; transition: all 0.2s; margin-bottom: 10px; }
  .btn-test:hover { border-color: var(--teal-brillante); color: var(--teal-brillante); }
  .btn-generate { width: 100%; background: var(--teal); border: none; border-radius: 8px; color: var(--azul-profundo); font-family: 'Poppins', sans-serif; font-size: 15px; font-weight: 700; padding: 16px; cursor: pointer; transition: all 0.2s; margin-bottom: 12px; }
  .btn-generate:hover { background: var(--teal-brillante); }
  .btn-generate:disabled { background: var(--linea); color: var(--gris-azulado); cursor: not-allowed; }
  .btn-print { width: 100%; background: none; border: 1px solid var(--teal); border-radius: 8px; color: var(--teal); font-family: 'Poppins', sans-serif; font-size: 14px; font-weight: 600; padding: 13px; cursor: pointer; transition: all 0.2s; display: none; margin-top: 8px; }
  .btn-print:hover { background: #3DADBB15; }
  .status-msg { text-align: center; font-size: 13px; color: var(--gris-azulado); padding: 12px; display: none; }
  #preview-section { display: none; margin-top: 32px; }
  .preview-label { font-size: 10px; font-weight: 600; letter-spacing: 2px; color: var(--teal); text-transform: uppercase; margin-bottom: 16px; }

  /* ===== DOCUMENTO COTIZACION ===== */
  .cotizacion-page {
    background: #fff;
    color: #1a1a2e;
    width: 210mm;
    margin: 0 auto;
    font-family: 'Poppins', sans-serif;
    font-size: 10pt;
    border: 1px solid #ddd;
  }

  .cot-header { padding: 14px 28px 12px; display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 2px solid #3DADBB; }
  .cot-logo { width: 80px; height: auto; object-fit: contain; display: block; }
  .cot-empresa-info { text-align: right; font-size: 7.5pt; color: #333; line-height: 1.65; }
  .cot-empresa-info .empresa-nombre { font-size: 8pt; font-weight: 700; color: #101E27; display: block; margin-bottom: 1px; }
  .cot-empresa-info .rnc-line { color: #3DADBB; font-weight: 600; display: block; }

  .cot-meta { padding: 14px 28px 12px; display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 1px solid #e0e8ea; }
  .cot-cliente-label { font-size: 6.5pt; font-weight: 600; letter-spacing: 2px; color: #92ADB7; text-transform: uppercase; margin-bottom: 3px; }
  .cot-cliente-nombre { font-size: 16pt; font-weight: 700; color: #101E27; margin-bottom: 5px; line-height: 1.15; }
  .cot-cliente-datos { font-size: 7.5pt; color: #444; line-height: 1.8; }
  .cot-cliente-datos b { color: #222; }
  .cot-numero-box { text-align: right; flex-shrink: 0; padding-left: 20px; }
  .cot-numero-title { font-size: 20pt; font-weight: 700; color: #3DADBB; letter-spacing: -0.5px; line-height: 1; }
  .cot-numero-num { font-size: 12pt; font-weight: 600; color: #101E27; margin: 2px 0 6px; }
  .cot-fechas { font-size: 7.5pt; color: #555; line-height: 1.9; text-align: right; }
  .cot-fechas b { color: #222; }

  .cot-subtitulo { padding: 6px 28px; background: #f0f6f7; }
  .cot-subtitulo-text { font-size: 7pt; font-weight: 600; letter-spacing: 2.5px; color: #3DADBB; text-transform: uppercase; }

  .cot-tabla { width: 100%; border-collapse: collapse; }
  .cot-tabla thead tr { background: #101E27; color: #fff; }
  .cot-tabla thead th { font-size: 7pt; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; padding: 8px 14px; text-align: left; }
  .cot-tabla thead th.right { text-align: right; }
  .cot-tabla thead th.center { text-align: center; }
  .cot-tabla tbody tr { border-bottom: 1px solid #e8eef0; }
  .cot-tabla tbody tr:last-child { border-bottom: none; }
  .cot-tabla td { padding: 11px 14px; vertical-align: top; font-size: 8pt; color: #333; }
  .cot-tabla td.center { text-align: center; }
  .cot-tabla td.right { text-align: right; white-space: nowrap; }
  .concepto-titulo-tabla { font-size: 8.5pt; font-weight: 600; color: #101E27; margin-bottom: 3px; display: block; }
  .concepto-desc-tabla { font-size: 7.5pt; color: #666; line-height: 1.55; text-align: justify; display: block; }

  .cot-totales-section { padding: 14px 28px; display: flex; justify-content: space-between; align-items: flex-start; gap: 24px; }
  .cot-letras { flex: 1; padding-top: 4px; }
  .cot-letras-label { font-size: 7pt; font-weight: 600; letter-spacing: 2px; color: #3DADBB; text-transform: uppercase; margin-bottom: 4px; }
  .cot-letras-valor { font-size: 7.5pt; font-style: italic; color: #444; font-weight: 500; line-height: 1.5; }
  .cot-totales-tabla { min-width: 260px; }
  .cot-total-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; font-size: 8pt; color: #555; border-bottom: 1px solid #e8eef0; }
  .cot-total-row:last-of-type { border-bottom: none; }
  .cot-total-row .t-label { font-weight: 400; }
  .cot-total-row .t-valor { font-weight: 600; color: #222; text-align: right; }
  .exento-badge { color: #3DADBB; font-weight: 700; font-size: 8.5pt; }
  .exento-nota { font-size: 6.5pt; color: #999; display: block; text-align: right; margin-top: 1px; }
  .total-final-row { background: #101E27; color: #fff; padding: 9px 14px; border-radius: 6px; margin-top: 7px; display: flex; justify-content: space-between; align-items: center; font-size: 8.5pt; font-weight: 700; }
  .total-final-row .t-valor { color: #3DADBB; font-size: 11pt; }

  .cot-terminos { padding: 12px 28px 14px; border-top: 1px solid #e0e8ea; background: #f9fbfc; }
  .cot-terminos-label { font-size: 7pt; font-weight: 700; letter-spacing: 2px; color: #3DADBB; text-transform: uppercase; margin-bottom: 8px; }
  .cot-terminos ul { list-style: none; padding: 0; }
  .cot-terminos li { font-size: 7.5pt; color: #555; padding: 2px 0 2px 12px; position: relative; line-height: 1.55; }
  .cot-terminos li::before { content: "\2022"; position: absolute; left: 0; color: #3DADBB; }
  .cot-terminos li b { color: #222; }

  .cot-footer { padding: 10px 28px; text-align: center; border-top: 1px solid #e0e8ea; }
  .cot-footer-servicios { font-size: 7pt; color: #bbb; margin-bottom: 3px; }
  .cot-footer-empresa { font-size: 8pt; font-weight: 700; color: #3DADBB; }

  @media print {
    * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
    html, body { margin: 0; padding: 0; background: #fff !important; }
    .app-wrapper > *:not(#preview-section) { display: none !important; }
    #preview-section { display: block !important; margin: 0 !important; padding: 0 !important; }
    .preview-label, .btn-print { display: none !important; }
    .cotizacion-page { width: 100% !important; border: none !important; margin: 0 !important; }
    @page { margin: 10mm 12mm; size: A4; }
  }
</style>
</head>
<body>
<div class="app-wrapper">

  <div class="app-header">
    <img id="app-logo" class="app-logo" alt="JCM Logo">
    <div class="app-title">
      <h1>Generador de Cotizaci&oacute;n</h1>
      <p>JCM Ingenier&iacute;a e Integraci&oacute;n Industrial, S.R.L. &middot; Domin&oacute; 1.2</p>
    </div>
  </div>

  <div class="form-section">
    <div class="section-label">Datos de la Cotizaci&oacute;n</div>
    <div class="form-grid three">
      <div><label>N&uacute;mero</label><input type="number" id="cot-numero" value="5" min="1"></div>
      <div><label>Fecha de Emisi&oacute;n</label><input type="date" id="cot-fecha"></div>
      <div><label>Subt&iacute;tulo (opcional)</label><input type="text" id="cot-subtitulo" placeholder="Ej: TRABAJOS EL&Eacute;CTRICOS GENERALES"></div>
    </div>
  </div>

  <div class="form-section">
    <div class="section-label">Datos del Cliente</div>
    <div class="form-grid">
      <div><label>Nombre / Empresa</label><input type="text" id="cli-nombre" placeholder="Ej: GTS SCM, S.A."></div>
      <div><label>RNC / C&eacute;dula</label><input type="text" id="cli-rnc" placeholder="Ej: 1-30-54710-6"></div>
      <div><label>Tel&eacute;fono</label><input type="text" id="cli-tel" placeholder="Ej: 809-575-3306"></div>
      <div><label>Direcci&oacute;n</label><input type="text" id="cli-dir" placeholder="Ej: Manzana H #5, Zona Franca Industrial"></div>
    </div>
  </div>

  <div class="form-section">
    <div class="section-label">R&eacute;gimen Fiscal</div>
    <div class="form-grid">
      <div><label>ITBIS</label>
        <select id="itbis-tipo">
          <option value="exento">EXENTO &mdash; Zona Franca / Ley 8-90</option>
          <option value="18">Aplicar 18% ITBIS</option>
          <option value="0">Sin ITBIS</option>
        </select>
      </div>
      <div><label>&iquest;Incluye materiales?</label>
        <select id="incluye-materiales">
          <option value="no">No incluye materiales</option>
          <option value="si">S&iacute; incluye materiales</option>
        </select>
      </div>
    </div>
  </div>

  <div class="form-section">
    <div class="section-label">Conceptos / Servicios</div>
    <div id="conceptos-container"></div>
    <button class="btn-add" onclick="agregarConcepto()">+ Agregar concepto</button>
  </div>

  <button class="btn-test" onclick="cargarDatosPrueba()">&#x1F9EA; Cargar datos de prueba</button>
  <button class="btn-generate" id="btn-generar" onclick="generarCotizacion()">&#x26A1; Generar Cotizaci&oacute;n con IA</button>
  <div class="status-msg" id="status-msg">Generando descripciones t&eacute;cnicas...</div>
  <button class="btn-print" id="btn-print" onclick="window.print()">&#x1F5A8; Imprimir / Descargar PDF</button>

  <div id="preview-section">
    <div class="preview-label">&mdash; Vista Previa &mdash;</div>
    <div id="cotizacion-render"></div>
  </div>

</div>

function formatMoney(num) {
  return "RD$" + Number(num).toLocaleString("es-DO", {minimumFractionDigits:2, maximumFractionDigits:2});
}

function fechaDisplay(dateStr) {
  var p = dateStr.split("-");
  return p[2]+"/"+p[1]+"/"+p[0];
}

function fechaValidez(dateStr) {
  var d = new Date(dateStr + "T12:00:00");
  d.setDate(d.getDate() + 15);
  return String(d.getDate()).padStart(2,"0")+"/"+String(d.getMonth()+1).padStart(2,"0")+"/"+d.getFullYear();
}

function numToWords(n) {
  if (n === 0) return "cero";
  var units = ["","uno","dos","tres","cuatro","cinco","seis","siete","ocho","nueve","diez","once","doce","trece","catorce","quince","dieciseis","diecisiete","dieciocho","diecinueve"];
  var tens = ["","","veinte","treinta","cuarenta","cincuenta","sesenta","setenta","ochenta","noventa"];
  var hundreds = ["","cien","doscientos","trescientos","cuatrocientos","quinientos","seiscientos","setecientos","ochocientos","novecientos"];
  if (n < 20) return units[n];
  if (n < 100) { if (n===21) return "veintiuno"; if (n<30) return "veinti"+units[n-20]; return tens[Math.floor(n/10)]+(n%10?" y "+units[n%10]:""); }
  if (n===100) return "cien";
  if (n<1000) return hundreds[Math.floor(n/100)]+(n%100?" "+numToWords(n%100):"");
  if (n<2000) return "mil"+(n%1000?" "+numToWords(n%1000):"");
  if (n<1000000) return numToWords(Math.floor(n/1000))+" mil"+(n%1000?" "+numToWords(n%1000):"");
  if (n<2000000) return "un millon"+(n%1000000?" "+numToWords(n%1000000):"");
  return numToWords(Math.floor(n/1000000))+" millones"+(n%1000000?" "+numToWords(n%1000000):"");
}

function numeroALetras(monto) {
  var num = Math.floor(monto);
  var centavos = Math.round((monto - num) * 100);
  return numToWords(num).toUpperCase() + " PESOS DOMINICANOS CON " + (centavos===0?"00/100":String(centavos).padStart(2,"0")+"/100");
}

function recolectarDatos() {
  var cards = document.querySelectorAll(".concepto-card");
  var items = [];
  cards.forEach(function(card) {
    var m = card.id.match(/concepto-(\d+)/);
    if (!m) return;
    var id = m[1];
    var nombre = ((document.getElementById("c"+id+"-nombre")||{}).value||"").trim();
    var cant = parseFloat((document.getElementById("c"+id+"-cant")||{}).value||1);
    var precio = parseFloat((document.getElementById("c"+id+"-precio")||{}).value||0);
    var contexto = ((document.getElementById("c"+id+"-contexto")||{}).value||"").trim();
    if (nombre) items.push({id:id, nombre:nombre, cant:cant, precio:precio, contexto:contexto});
  });
  return {
    numero: document.getElementById("cot-numero").value,
    fecha: document.getElementById("cot-fecha").value,
    subtitulo: document.getElementById("cot-subtitulo").value.trim(),
    cliente: {
      nombre: document.getElementById("cli-nombre").value.trim(),
      rnc: document.getElementById("cli-rnc").value.trim(),
      tel: document.getElementById("cli-tel").value.trim(),
      dir: document.getElementById("cli-dir").value.trim()
    },
    itbis: document.getElementById("itbis-tipo").value,
    incluyeMateriales: document.getElementById("incluye-materiales").value,
    items: items
  };
}

async function generarDescripciones(items) {
  var prompt = "Eres el redactor tecnico de JCM Ingenieria e Integracion Industrial, S.R.L., empresa dominicana de ingenieria electrica, automatizacion y energia solar.\n\nPara cada concepto genera una descripcion tecnica profesional en espanol (2-3 oraciones). Formal, tecnica, tercera persona. Menciona lo que incluye (montaje, conexionado, pruebas, verificacion, etc.).\n\nDevuelve SOLO JSON sin markdown:\n{\"descripciones\": [{\"id\": \"X\", \"descripcion\": \"texto\"}]}\n\nConceptos:\n" + items.map(function(i){ return "ID: "+i.id+"\nNombre: "+i.nombre+"\nContexto: "+(i.contexto||"ninguno"); }).join("\n\n");
  var response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({model:"claude-sonnet-4-6", max_tokens:1000, messages:[{role:"user", content:prompt}]})
  });
  var data = await response.json();
  var text = data.content.map(function(b){ return b.text||""; }).join("");
  return JSON.parse(text.replace(/```json|```/g,"").trim());
}

function generarTerminos(datos) {
  var t = [
    "Para iniciar los trabajos se requiere un anticipo del 50% del valor cotizado; el saldo restante contra entrega o segun condiciones acordadas entre ambas partes.",
    "Cotizacion valida por 15 dias calendario a partir de la fecha de emision."
  ];
  if (datos.itbis === "exento") t.push("Precios expresados en pesos dominicanos (RD$), <b>exentos de ITBIS</b> conforme al regimen de zona franca (Ley 8-90).");
  else t.push("Precios expresados en pesos dominicanos (RD$).");
  if (datos.incluyeMateriales === "no") t.push("<b>No incluye materiales.</b> Los materiales requeridos se cotizan por separado.");
  t.push("Servicios ejecutados conforme a la normativa electrica vigente y a las condiciones tecnicas acordadas en campo.");
  return t;
}

        '</div>' +

      '<div class="cot-numero-box">' +

async function generarCotizacion() {
  var datos = recolectarDatos();
  if (!datos.cliente.nombre) { alert("Por favor ingresa el nombre del cliente."); return; }
  if (datos.items.length === 0) { alert("Agrega al menos un concepto."); return; }
  if (datos.items.some(function(i){ return !i.precio || i.precio <= 0; })) { alert("Todos los conceptos deben tener precio."); return; }
  var btn = document.getElementById("btn-generar");
  var status = document.getElementById("status-msg");
  btn.disabled = true;
  status.style.display = "block";
  status.textContent = "Generando descripciones tecnicas con IA...";
  var descripciones = {descripciones:[]};
  try {
    descripciones = await generarDescripciones(datos.items.filter(function(i){ return !!i.nombre; }));
    status.textContent = "Listo. Renderizando...";
  } catch(e) {
    console.error(e);
    status.textContent = "Sin IA - usando contexto manual.";
  }
  var html = renderizarCotizacion(datos, descripciones);
  document.getElementById("cotizacion-render").innerHTML = html;
  document.getElementById("preview-section").style.display = "block";
  document.getElementById("btn-print").style.display = "block";
  btn.disabled = false;
  status.style.display = "none";
  document.getElementById("preview-section").scrollIntoView({behavior:"smooth"});
}
