<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JCM — Comparador de Cotizaciones</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --azul: #101E27; --azul-medio: #1B3340; --teal: #3DADBB;
    --teal-b: #60D3E0; --blanco: #F4F9FA; --gris: #92ADB7; --linea: #2C4654;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Poppins', sans-serif; background: var(--azul); color: var(--blanco); min-height: 100vh; }
  .wrap { max-width: 960px; margin: 0 auto; padding: 28px 20px; }

  .app-header { display: flex; align-items: center; gap: 14px; margin-bottom: 28px; padding-bottom: 18px; border-bottom: 1px solid var(--linea); }
  .app-logo { width: 65px; height: auto; object-fit: contain; }
  .app-title h1 { font-size: 19px; font-weight: 700; }
  .app-title p { font-size: 11px; color: var(--gris); margin-top: 2px; }

  .sec { background: var(--azul-medio); border: 1px solid var(--linea); border-radius: 10px; padding: 20px; margin-bottom: 16px; }
  .sec-label { font-size: 10px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--teal); margin-bottom: 12px; padding-bottom: 6px; border-bottom: 1px solid var(--linea); }
  .sec-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; padding-bottom: 6px; border-bottom: 1px solid var(--linea); }
  .sec-header-label { font-size: 10px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--teal); }
  .sec-header-count { font-size: 10px; color: var(--gris); }

  label { display: block; font-size: 11px; color: var(--gris); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
  textarea, input[type=text] { width: 100%; background: var(--azul); border: 1px solid var(--linea); border-radius: 6px; color: var(--blanco); font-family: 'Poppins', sans-serif; font-size: 12px; padding: 9px 12px; outline: none; transition: border-color 0.2s; }
  textarea:focus, input[type=text]:focus { border-color: var(--teal); }
  textarea { resize: vertical; min-height: 160px; }

  /* SUPLIDORES */
  .sups-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .sup-card { background: var(--azul); border: 1px solid var(--linea); border-radius: 8px; padding: 14px; position: relative; }
  .sup-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .sup-num { font-size: 10px; font-weight: 600; color: var(--teal); text-transform: uppercase; letter-spacing: 1px; }
  .btn-remove-sup { background: none; border: 1px solid #c0392b44; color: #e74c3c; border-radius: 4px; padding: 2px 8px; font-size: 10px; cursor: pointer; font-family: 'Poppins', sans-serif; transition: all 0.2s; }
  .btn-remove-sup:hover { background: #e74c3c22; }
  .sup-card input[type=text] { margin-bottom: 8px; }
  .file-drop { border: 1px dashed var(--linea); border-radius: 6px; padding: 10px; text-align: center; cursor: pointer; transition: all 0.2s; font-size: 11px; color: var(--gris); }
  .file-drop:hover { border-color: var(--teal); color: var(--teal); background: #3DADBB0A; }
  .file-drop.loaded { border-color: var(--teal); color: var(--teal-b); background: #3DADBB0A; }
  .file-input { display: none; }

  /* BOTÓN AGREGAR SUPLIDOR */
  .btn-add-sup { width: 100%; background: none; border: 1px dashed var(--linea); border-radius: 8px; color: var(--gris); font-family: 'Poppins', sans-serif; font-size: 12px; padding: 10px; cursor: pointer; transition: all 0.2s; margin-top: 12px; }
  .btn-add-sup:hover { border-color: var(--teal); color: var(--teal); background: #3DADBB0A; }
  .btn-add-sup:disabled { opacity: 0.4; cursor: not-allowed; }

  /* BOTONES ACCIÓN */
  .btn-analizar { width: 100%; background: var(--teal); border: none; border-radius: 8px; color: var(--azul); font-family: 'Poppins', sans-serif; font-size: 15px; font-weight: 700; padding: 15px; cursor: pointer; transition: all 0.2s; margin-bottom: 10px; }
  .btn-analizar:hover { background: var(--teal-b); }
  .btn-analizar:disabled { background: var(--linea); color: var(--gris); cursor: not-allowed; }
  .btn-excel { width: 100%; background: none; border: 1px solid var(--teal); border-radius: 8px; color: var(--teal); font-family: 'Poppins', sans-serif; font-size: 13px; font-weight: 600; padding: 12px; cursor: pointer; transition: all 0.2s; display: none; }
  .btn-excel:hover { background: #3DADBB15; }
  .status { text-align: center; font-size: 12px; color: var(--gris); padding: 10px; display: none; }

  /* RESULTADO */
  #resultado { display: none; margin-top: 24px; }
  .res-label { font-size: 10px; font-weight: 600; letter-spacing: 2px; color: var(--teal); text-transform: uppercase; margin-bottom: 14px; }
  .tabla-wrap { overflow-x: auto; border-radius: 8px; border: 1px solid var(--linea); }
  table { width: 100%; border-collapse: collapse; font-size: 11px; background: #fff; color: #1a1a2e; }
  thead tr { background: var(--azul); color: #fff; }
  thead th { padding: 9px 10px; text-align: left; font-size: 9px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; white-space: nowrap; }
  thead th.right { text-align: right; }
  tbody tr { border-bottom: 1px solid #E8EEF0; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:nth-child(even) { background: #F9FBFC; }
  td { padding: 9px 10px; vertical-align: middle; }
  td.right { text-align: right; white-space: nowrap; }
  td.item-desc { font-weight: 500; color: #101E27; max-width: 220px; }
  td.qty { text-align: center; color: #555; }
  .badge { display: inline-block; padding: 2px 7px; border-radius: 10px; font-size: 9px; font-weight: 600; }
  .badge-ok { background: #D4EDDA; color: #155724; }
  .badge-alt { background: #FFF3CD; color: #856404; }
  .badge-no { background: #F8D7DA; color: #721C24; }
  td.precio-best { color: #155724; font-weight: 700; background: #D4EDDA44; }
  tr.fila-total { background: var(--azul) !important; }
  tr.fila-total td { color: #fff; font-weight: 700; }
  tr.fila-total td.total-val { color: var(--teal); font-size: 12px; }
  tr.fila-recomienda { background: #EAF6F7 !important; font-style: italic; font-size: 10px; color: #1B3340; }
</style>
</head>
<body>
<div class="wrap">

  <div class="app-header">
    <img id="app-logo" class="app-logo" alt="JCM">
    <div class="app-title">
      <h1>Comparador de Cotizaciones de Suplidores</h1>
      <p>JCM Ingeniería e Integración Industrial, S.R.L. &middot; Dominó 1.3</p>
    </div>
  </div>

  <!-- LISTA -->
  <div class="sec">
    <div class="sec-label">Lista de Materiales Solicitados</div>
    <label>Pega tu lista tal como la enviaste a los suplidores</label>
    <textarea id="lista-mat" placeholder="Ej:&#10;5 Interruptores de nivel conmutable (flotas)&#10;1 Gabinete fibra/poliéster 500x400x200 mm&#10;3 Contactores Schneider MC32 bobina 220V&#10;..."></textarea>
  </div>

  <!-- SUPLIDORES -->
  <div class="sec">
    <div class="sec-header">
      <span class="sec-header-label">Cotizaciones de Suplidores</span>
      <span class="sec-header-count" id="sup-count">2 de 6 máximo</span>
    </div>
    <div class="sups-grid" id="sups-grid"></div>
    <button class="btn-add-sup" id="btn-add-sup" onclick="agregarSuplidor()">+ Agregar suplidor</button>
  </div>

  <button class="btn-analizar" id="btn-analizar" onclick="analizar()">&#x26A1; Analizar Cotizaciones</button>
  <div class="status" id="status"></div>
  <button class="btn-excel" id="btn-excel" onclick="descargarExcel()">&#x1F4E5; Descargar Excel</button>

  <div id="resultado">
    <div class="res-label">&mdash; Resultado del Análisis &mdash;</div>
    <div class="tabla-wrap"><table id="tabla-res"></table></div>
  </div>

</div>

FFABRRRQAUUUUAFFFFABRRRQAUUUUAFFFFABRRRQAUUUUAFFFFABRRRQAUUUUAFFFFABRRRQAUUUUAFFFFABRRRQAUUUUAFFFFABRRRQAUUUUAFFFFABRRRQAUUUUAFFFFABRRRQAUUUUAFFFFABRRRQAUUUUAFFFFABRRRQAUUUUAFFFFABRRRQAUUUUAFFFFABRRRQB//2Q==";
document.getElementById("app-logo").src = LOGO_URI;

var archivos = {};
var supCounter = 0;
var supIds = [];
var MAX_SUPS = 6;
var resultadoGlobal = null;

function actualizarContador() {
  var n = supIds.length;
  document.getElementById("sup-count").textContent = n + " de " + MAX_SUPS + " máximo";
  var btn = document.getElementById("btn-add-sup");
  btn.disabled = n >= MAX_SUPS;
  btn.textContent = n >= MAX_SUPS ? "Máximo de suplidores alcanzado" : "+ Agregar suplidor";
}

function agregarSuplidor(esInicial) {
  if (supIds.length >= MAX_SUPS) return;
  supCounter++;
  var id = supCounter;
  supIds.push(id);

  var esOpcional = !esInicial;
  var label = "Suplidor " + supIds.length + (esOpcional ? " (opcional)" : "");

  var div = document.createElement("div");
  div.className = "sup-card";
  div.id = "sup-card-" + id;
  div.innerHTML =
    '<div class="sup-card-header">' +
      '<span class="sup-num" id="sup-label-' + id + '">' + label + '</span>' +
      (esOpcional ? '<button class="btn-remove-sup" onclick="removerSuplidor(' + id + ')">✕ Quitar</button>' : '') +
    '</div>' +
    '<label>Nombre del suplidor</label>' +
    '<input type="text" id="sup' + id + '-nombre" placeholder="Ej: JABR SRL">' +
    '<div class="file-drop" id="drop' + id + '" onclick="document.getElementById(\'file' + id + '\').click()">' +
      '📄 Click para subir PDF' +
    '</div>' +
    '<input type="file" class="file-input" id="file' + id + '" accept=".pdf" onchange="archivoSeleccionado(' + id + ', this)">';

  document.getElementById("sups-grid").appendChild(div);
  actualizarContador();
}

function removerSuplidor(id) {
  var card = document.getElementById("sup-card-" + id);
  if (card) card.remove();
  delete archivos[id];
  supIds = supIds.filter(function(x) { return x !== id; });
  // Renum etiquetas
  supIds.forEach(function(sid, idx) {
    var lbl = document.getElementById("sup-label-" + sid);
    if (lbl) lbl.textContent = "Suplidor " + (idx + 1) + (idx >= 2 ? " (opcional)" : "");
  });
  actualizarContador();
}

function archivoSeleccionado(id, input) {
  if (!input.files[0]) return;
  archivos[id] = input.files[0];
  var drop = document.getElementById("drop" + id);
  drop.textContent = "✓ " + input.files[0].name;
  drop.classList.add("loaded");
}

function setStatus(msg) {
  var s = document.getElementById("status");
  s.style.display = msg ? "block" : "none";
  s.textContent = msg;
}

async function pdfToBase64(file) {
  return new Promise(function(resolve, reject) {
    var reader = new FileReader();
    reader.onload = function(e) { resolve(e.target.result.split(",")[1]); };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function analizar() {
  var lista = document.getElementById("lista-mat").value.trim();
  if (!lista) { alert("Pega tu lista de materiales."); return; }

  var sups = [];
  supIds.forEach(function(id) {
    var nombre = (document.getElementById("sup" + id + "-nombre") || {}).value || "";
    nombre = nombre.trim();
    var archivo = archivos[id];
    if (nombre && archivo) sups.push({ nombre: nombre, archivo: archivo });
  });

  if (sups.length === 0) { alert("Agrega al menos un suplidor con nombre y PDF."); return; }

  var btn = document.getElementById("btn-analizar");
  btn.disabled = true;
  document.getElementById("btn-excel").style.display = "none";
  document.getElementById("resultado").style.display = "none";

  var content = [];
  for (var i = 0; i < sups.length; i++) {
    setStatus("Leyendo PDF de " + sups[i].nombre + "... (" + (i+1) + "/" + sups.length + ")");
    var b64 = await pdfToBase64(sups[i].archivo);
    content.push({ type: "document", source: { type: "base64", media_type: "application/pdf", data: b64 } });
  }

  var supNombres = sups.map(function(s) { return s.nombre; }).join(", ");
  var prompt = "Eres un asistente de compras para JCM Ingeniería e Integración Industrial.\n\n" +
    "Te envío la lista de materiales que JCM solicitó cotizar y los PDF de " + sups.length + " suplidor(es): " + supNombres + "\n\n" +
    "LISTA DE MATERIALES SOLICITADOS:\n" + lista + "\n\n" +
    "TAREA: Para cada ítem de la lista, identifica qué cotizó cada suplidor.\n\n" +
    "ESTADOS:\n" +
    "- EXACTO: cotizó exactamente lo solicitado (misma ref. o equivalente claro)\n" +
    "- ALTERNATIVA: cotizó algo similar pero diferente marca/modelo/spec\n" +
    "- NO COTIZÓ: no aparece ese ítem\n\n" +
    "Devuelve SOLO JSON sin markdown:\n" +
    "{\n" +
    "  \"suplidores\": [\"Nombre1\", \"Nombre2\"],\n" +
    "  \"items\": [\n" +
    "    {\n" +
    "      \"descripcion\": \"ítem tal como lo pediste\",\n" +
    "      \"cantidad\": \"5\",\n" +
    "      \"unidad\": \"und\",\n" +
    "      \"suplidores\": [\n" +
    "        { \"estado\": \"EXACTO\", \"descripcion_cotizada\": \"lo que cotizó\", \"precio_unit\": 1500.00, \"subtotal\": 7500.00 },\n" +
    "        { \"estado\": \"NO COTIZÓ\", \"descripcion_cotizada\": \"\", \"precio_unit\": null, \"subtotal\": null }\n" +
    "      ]\n" +
    "    }\n" +
    "  ],\n" +
    "  \"totales\": [59364.41, 0],\n" +
    "  \"notas\": \"observaciones sobre diferencias, alternativas o faltantes\"\n" +
    "}";

  content.push({ type: "text", text: prompt });
  setStatus("Analizando con IA... (15-30 segundos)");

  try {
    var response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ model: "claude-sonnet-4-6", max_tokens: 4000, messages: [{ role: "user", content: content }] })
    });
    var data = await response.json();
    var text = data.content.map(function(b) { return b.text || ""; }).join("");
    var resultado = JSON.parse(text.replace(/```json|```/g, "").trim());
    resultadoGlobal = resultado;
    setStatus("");
    renderTabla(resultado);
    document.getElementById("btn-excel").style.display = "block";
  } catch(e) {
    console.error(e);
    setStatus("Error al analizar. Verifica los archivos e intenta de nuevo.");
  }
  btn.disabled = false;
}

function fmt(val) {
  if (val === null || val === undefined) return "—";
  return "RD$" + Number(val).toLocaleString("es-DO", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function renderTabla(r) {
  var sups = r.suplidores;
  var items = r.items;
  var minimos = items.map(function(item) {
    var precios = item.suplidores.map(function(s) { return s.subtotal; }).filter(function(p) { return p !== null; });
    return precios.length ? Math.min.apply(null, precios) : null;
  });

  var html = "<thead><tr><th>Ítem solicitado</th><th class='qty'>Cant.</th>";
  sups.forEach(function(s) {
    html += "<th class='right'>" + s + "<br><span style='font-weight:400;font-size:8px'>Estado / P.Unit / Subtotal</span></th>";
  });
  html += "</tr></thead><tbody>";

  items.forEach(function(item, idx) {
    html += "<tr><td class='item-desc'>" + item.descripcion + "</td><td class='qty'>" + item.cantidad + " " + (item.unidad || "") + "</td>";
    item.suplidores.forEach(function(s) {
      var bc = s.estado === "EXACTO" ? "badge-ok" : s.estado === "ALTERNATIVA" ? "badge-alt" : "badge-no";
      var esMin = s.subtotal !== null && s.subtotal === minimos[idx];
      var desc = s.descripcion_cotizada ? "<br><span style='font-size:9px;color:#666;font-style:italic'>" + s.descripcion_cotizada + "</span>" : "";
      var pu = s.precio_unit !== null ? fmt(s.precio_unit) + " c/u" : "—";
      var st = s.subtotal !== null ? fmt(s.subtotal) : "—";
      var mejor = (esMin && sups.length > 1) ? " ✓" : "";
      html += "<td class='" + (esMin ? "right precio-best" : "right") + "'><span class='badge " + bc + "'>" + s.estado + "</span>" + desc + "<br>" + pu + "<br><strong>" + st + mejor + "</strong></td>";
    });
    html += "</tr>";
  });

  // Totales
  html += "<tr class='fila-total'><td colspan='2'>TOTAL GENERAL (sin ITBIS)</td>";
  r.totales.forEach(function(t) {
    html += "<td class='right total-val'>" + fmt(t) + "</td>";
  });
  html += "</tr>";

  // Recomendación
  if (sups.length > 1) {
    var validos = r.totales.filter(function(t) { return t > 0; });
    if (validos.length) {
      var minT = Math.min.apply(null, validos);
      var idxMin = r.totales.indexOf(minT);
      html += "<tr class='fila-recomienda'><td colspan='2'>💡 Más económico en total</td>";
      r.totales.forEach(function(t, i) {
        html += "<td class='right'>" + (i === idxMin ? "✓ " + sups[i] : "") + "</td>";
      });
      html += "</tr>";
    }
  }
  html += "</tbody>";

  document.getElementById("tabla-res").innerHTML = html;
  document.getElementById("resultado").style.display = "block";

  // Notas
  var viejaNota = document.getElementById("nota-analisis");
  if (viejaNota) viejaNota.remove();
  if (r.notas) {
    var notaDiv = document.createElement("div");
    notaDiv.id = "nota-analisis";
    notaDiv.style.cssText = "margin-top:12px;padding:12px;background:#FFF3CD;border-radius:6px;font-size:11px;color:#856404;border:1px solid #FFEAA7;";
    notaDiv.innerHTML = "<strong>⚠ Observaciones:</strong> " + r.notas;
    document.getElementById("resultado").appendChild(notaDiv);
  }
  document.getElementById("resultado").scrollIntoView({ behavior: "smooth" });
}

function descargarExcel() {
  if (!resultadoGlobal) return;
  var r = resultadoGlobal;
  var sups = r.suplidores;
  var ws_data = [];
  ws_data.push(["COMPARADOR DE COTIZACIONES — JCM Ingeniería e Integración Industrial"]);
  ws_data.push(["Generado: " + new Date().toLocaleDateString("es-DO")]);
  ws_data.push([]);
  var header = ["Ítem Solicitado", "Cantidad", "Unidad"];
  sups.forEach(function(s) {
    header.push(s + " — Estado");
    header.push(s + " — Descripción Cotizada");
    header.push(s + " — Precio Unit.");
    header.push(s + " — Subtotal");
  });
  ws_data.push(header);
  r.items.forEach(function(item) {
    var row = [item.descripcion, item.cantidad, item.unidad || "und"];
    item.suplidores.forEach(function(s) {
      row.push(s.estado);
      row.push(s.descripcion_cotizada || "");
      row.push(s.precio_unit !== null ? s.precio_unit : "");
      row.push(s.subtotal !== null ? s.subtotal : "");
    });
    ws_data.push(row);
  });
  ws_data.push([]);
  var totalRow = ["TOTAL GENERAL (sin ITBIS)", "", ""];
  r.totales.forEach(function(t) { totalRow.push("", "", "", t); });
  ws_data.push(totalRow);
  if (r.notas) { ws_data.push([]); ws_data.push(["OBSERVACIONES:", r.notas]); }

  var wb = XLSX.utils.book_new();
  var ws = XLSX.utils.aoa_to_sheet(ws_data);
  var cols = [{ wch: 35 }, { wch: 9 }, { wch: 8 }];
  sups.forEach(function() { cols.push({ wch: 14 }, { wch: 30 }, { wch: 14 }, { wch: 14 }); });
  ws["!cols"] = cols;
  XLSX.utils.book_append_sheet(wb, ws, "Comparación");
  XLSX.writeFile(wb, "Comparacion_Cotizaciones_JCM.xlsx");
}

// Iniciar con 2 suplidores
agregarSuplidor(true);
agregarSuplidor(true);
